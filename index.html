<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dutch — My Hand</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>Dutch</h1>
        <p class="sub">Your hand</p>
      </div>
      <div class="total" id="totalBox">
        <span class="total-label">Total</span>
        <span class="total-val" id="totalVal">0</span>
      </div>
    </header>

    <section class="cards" id="cards"></section>

    <div class="toolbar">
      <button class="btn" id="swapBtn"><span class="ic">&#8646;</span> Swap two</button>
      <button class="btn solid" id="endBtn"><span class="ic">&#931;</span> End round</button>
      <button class="btn" id="resetBtn"><span class="ic">&#8635;</span> New round</button>
    </div>

    <p class="hint" id="hint">Tap a card to set it.</p>
  </main>

  <div class="sheet-backdrop" id="backdrop" hidden></div>
  <div class="sheet" id="sheet" hidden>
    <div class="sheet-head">
      <span id="sheetLabel">Card 1</span>
      <button class="x" id="closeSheet" aria-label="Close">&times;</button>
    </div>

    <div class="picker" id="picker"></div>

    <div class="sheet-actions">
      <button class="btn ghost" id="unknownBtn"><span class="ic">?</span> Unknown</button>
      <button class="btn danger" id="deleteBtn"><span class="ic">&#10005;</span> Throw out</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
